<!doctype html>
<html lang="es" translate="no">

<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SICA Captura">

  <link rel="apple-touch-icon" href="/icon-512.png">
  <!-- %APP_VERSION% lo sustituye el plugin html-app-version desde package.json.
       Escrito a mano se desincronizaba: llegó a decir v2.6.1 cuando el bundle
       era 2.6.6. -->
  <title>SICA Capture v%APP_VERSION%</title>

  <!-- Sin "CACHE BOUNCE" ni "CACHE NUKE TRINITY".
       El bounce redirigía a ?v=261 siempre que el parámetro no coincidiera.
       VersionGuard recarga con ?v=<timestamp>, que nunca es '261': los dos se
       reescribían la URL mutuamente en bucle infinito. La invalidación de caché
       ahora vive donde corresponde — cabeceras en vercel.json y sw-purge.js —
       no en un redirect que pelea con la app.

       Tampoco se fuerza aquí el update() del service worker: main.tsx ya lo
       hace de forma controlada (con guarda de controllerchange), y hacerlo dos
       veces provocaba recargas simultáneas que abortaban la descarga de chunks
       a medio vuelo. -->
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
